syntax = "proto3";

option go_package = "proto_gen/";

package node;

service Communication {
  rpc Read(Key) returns (Value);
  rpc Write(KeyValuePair) returns (Void);
}

message KeyValuePair {
  string key   = 1;
  uint64 hash  = 2;
  bytes  value = 3;
}

message Key {
  string key = 1;
}

message Value {
  repeated bytes payload = 1;
}

message Void {
}